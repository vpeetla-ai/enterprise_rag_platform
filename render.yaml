services:
  - type: web
    name: enterprise-rag-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: AEGISAI_GATEWAY_ENABLED
        value: "false"
      - key: QDRANT_BACKEND
        value: "false"
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
